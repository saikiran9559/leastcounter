# Scorely — phased implementation plan
#
# Living document. Update whenever a task or phase changes status. Detailed
# per-game scoring rules and complexity tiers live in docs/games.md; the
# seven shared UI patterns are listed at the bottom of that file and are
# the unit of phase-planning here.
#
# Status legend:
#   done         — shipped to main
#   in-progress  — actively being worked on; ideally only one task at a time
#   planned      — queued, not started
#   blocked      — waiting on a dep or a decision; record the blocker in `notes`
#
# How to update:
#   - On starting a task, set its status to in-progress.
#   - On shipping, set to done and bump `updated` at the top.
#   - If a task triggers an architectural decision, write an ADR in
#     docs/decisions/ — don't bury the rationale in this file.

project: Scorely
updated: 2026-06-10
live_url: https://saikiran9559.github.io/scorely/
repo: saikiran9559/scorely

current_phase: 10
next_up: cricket-match-scoreboard
notes: >
  Phases 0–9 all shipped. 49 built-in games + Tournament + custom games
  via the in-app builder. Werewolf (8.5) is explicit out-of-scope as a
  state-tracker. 7 sibling engines, 15 ADRs.
  Phase 9 (Discovery + UX polish) closed out — all 13 tasks done.
  Phase 10 consolidates every deferred, partial, and follow-up item
  from Phases 2–9 into a single actionable backlog under the banner
  of "Cricket Match Scoreboard" — the biggest single pending feature —
  plus all the smaller polish items that were explicitly deferred.
  Pick up any task when a real user asks or when it blocks a release.

phases:

  - phase: 0
    title: Foundation
    status: done
    summary: >
      Ship Least Count end-to-end, set up deploy + docs + rules infrastructure,
      and establish the multi-game vision.
    tasks:
      - id: 0.1
        title: Build Least Count scoreboard
        status: done
      - id: 0.2
        title: PDF export of results (jsPDF + autoTable)
        status: done
      - id: 0.3
        title: Deploy to GitHub Pages under saikiran9559/scorely
        status: done
      - id: 0.4
        title: UI animations (card load, chip pop-in, row slide-in, total flash, winner pop)
        status: done
      - id: 0.5
        title: Catalog candidate games (docs/games.md)
        status: done
      - id: 0.6
        title: Establish rules (.claude/rules/) — deploy-sync + documentation
        status: done
      - id: 0.7
        title: Establish docs/ folder with README and first ADR
        status: done
      - id: 0.8
        title: Rename repo from leastcounter to scorely
        status: done

  - phase: 1
    title: Reusable scoring engine
    status: done
    deps: []
    summary: >
      Extracted the Least Count code into a generic engine in engine.js.
      Games are declarative configs (Scorely.defineGame). Hash router added
      (#/, #/<game-id>) with home screen. UNO shipped as second game to
      validate the engine API. ADR 0003 captures the design rationale.
    goals:
      - Game-agnostic state shape (players, rounds, totals, win condition)  # done
      - Hash-based router so each game lives at /#/<game-slug>                # done
      - Game registry + home screen listing available games                   # done
      - Least Count refactored as the proof-of-concept consumer              # done
      - Storage keys namespaced as scorely:<game>:v1                          # done
    tasks:
      - id: 1.1
        title: Design engine API — what's game-agnostic vs game-specific
        status: done
        notes: Config-driven (direction × endCondition matrix). See ADR 0003.
      - id: 1.2
        title: Hash router (#/least-count, #/uno, ...) with browser back/forward
        status: done
      - id: 1.3
        title: Game registry + home screen listing available games
        status: done
      - id: 1.4
        title: Refactor Least Count to consume the engine
        status: done
      - id: 1.5
        title: Migrate localStorage to scorely:<game>:v1 with read-fallback from leastcounter:v1
        status: done
      - id: 1.6
        title: Write docs/architecture.md + ADR for engine API
        status: done

  - phase: 2
    title: Pattern 1+2 — cumulative scoring games (easy wins)
    status: done
    deps: [1]
    summary: >
      Highest leverage phase: 8 games shipped as thin engine configs. Patterns
      1 (lowest wins, threshold elimination) and 2 (highest wins, race to target)
      are the engine's native shape, so each game here should be <1 day.
    tasks:
      - id: 2.1
        title: UNO  (pattern 2, target 500)
        status: done
        notes: Shipped in Phase 1 as engine-validation second game per ADR 0002.
      - id: 2.2
        title: Rummy — Indian 13-card  (pattern 1, threshold 101/201, per-round cap 80, drop = 20/40)
        status: done
        notes: >
          Shipped with engine extension `roundInputMax` for the 80-point cap.
          Drop quick-fill buttons (20/40) deferred to a future polish pass.
      - id: 2.3
        title: Crazy Eights / Switch  (pattern 1)
        status: done
      - id: 2.4
        title: Tonk  (pattern 1, optional stake multiplier)
        status: done
        notes: Stake multiplier deferred — out of scope for the pure-config engine.
      - id: 2.5
        title: Phase 10  (pattern 1 + per-player phase column)
        status: done
        notes: >
          Shipped with engine extension: roundInputs schema (multi-field
          per-player per-round) + progress-reach endCondition. Round data
          model migrated from r.scores to r.entries with backwards-compat
          read fallback. See ADR 0004.
      - id: 2.6
        title: Dominoes  (pattern 1)
        status: done
      - id: 2.7
        title: Rummikub  (pattern 1)
        status: done
      - id: 2.8
        title: Farkle / Ten Thousand  (pattern 2, target 10000)
        status: done

  - phase: 3
    title: Pattern 4 — team / partnership games (split into 3a done / 3b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 3a (done): light team support via playerNoun/defaultPlayers,
      threshold-end endCondition for Hearts. Ships Hearts, Mendikot, Court
      Piece. Phase 3b (deferred): partnership games (Spades, 28/29, Euchre,
      Pitch, Whist) need per-round score formulas — a callback or a new
      config primitive. See ADR 0005.
    tasks:
      - id: 3.1
        title: Engine — playerNoun + defaultPlayers + threshold-end (Phase 3a slice)
        status: done
        notes: Full team-layout (per-team player rosters) deferred to Phase 3b.
      - id: 3.2
        title: Spades  (bid + tricks + bag-overflow penalty)
        status: done
        notes: >
          Shipped via per-game computeTotal callback (ADR 0012, partial
          revision of ADR 0003). 2 teams via playerNoun, bid+tricks per
          hand, computeTotal walks rounds applying the bid×10 + bags
          formula with 10-bag -100 penalty. formatRoundCell shows "B/T"
          (bid/tricks) per cell.
      - id: 3.3
        title: Hearts  (shoot-the-moon toggle, 4 players, no teams)
        status: done
        notes: >
          Shipped via threshold-end + low. Shoot-the-moon UX (one-click 26-to-others)
          is a future polish — users currently enter 0/26 manually.
      - id: 3.4
        title: 28 / 29 / 56  (Indian trick-taking, bid + trump + result)
        status: done
        notes: >
          Shipped as one game covering all three variants — user enters
          bid + card points; engine compares teams' entries per round and
          awards ±1 game-point per hand. Target 5 game-points by default.
          Uses cross-team lookup in computeTotal (state.players is in scope).
      - id: 3.5
        title: Court Piece / Rang / Hokm  (hands-won + kot bonus)
        status: done
        notes: Kot bonus tracked manually for now — the engine doesn't auto-double on a 7-0 sweep.
      - id: 3.6
        title: Mendikot  (tens + tricks)
        status: done
        notes: Modeled as 2-team target-reach on hands-won. Tens-captured detail not stored separately.
      - id: 3.7
        title: Euchre  (maker + tricks + march + loner)
        status: done
        notes: >
          Shipped as plain config — no formula needed. Per hand, user enters
          the team's points (1 / 2 / 4) directly into the score field; engine
          sums. Distinguishing march vs loner is left to the user (the
          tagline reminds them which case maps to which value).
      - id: 3.8
        title: Pitch / Setback  (named-bonus scoring — high/low/jack/game)
        status: done
        notes: >
          Shipped via computeTotal (ADR 0012). Two roundInputs per team
          (bid + bonuses-won). If bid > 0 (bidder team): bonuses ≥ bid →
          +bonuses, else −bid. Non-bidder team always +bonuses.
          formatRoundCell shows "bid N · M" for the bidding team.
      - id: 3.9
        title: Whist (rubber)
        status: done
        notes: >
          Shipped as simplified counter game — target = N games (default 2)
          to win a rubber. The inner 5-points-per-game (odd tricks)
          tracking is left to the table; this tab counts games-won which
          is what survives long-term anyway.

  - phase: 4
    title: Pattern 3 — fixed-category grid games (split into 4a done / 4b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 4a (done): new engine-grid.js for sum-of-categories games.
      Ships Wingspan, 7 Wonders, Disc Golf. Phase 4b (deferred): Yahtzee,
      Bowling, Golf-with-modes, Archery — each needs an extension beyond
      simple summing (section bonuses, frame carry-over, scoring modes,
      nested grids). See ADR 0006.
    tasks:
      - id: 4.1
        title: Engine — engine-grid.js (sum-of-categories shape)
        status: done
        notes: Derived/bonus categories (Yahtzee upper bonus, Yahtzee jokers) deferred to 4b.
      - id: 4.2
        title: Yahtzee
        status: done
        notes: >
          Shipped on the existing grid engine via cherry-pick (ADR 0010).
          Upper-section bonus (+35) and Yahtzee bonuses (+100 each) are
          tracked in a user-managed 'Bonuses' category — engine does not
          auto-compute them. Engine-side auto-derivation is a future
          extension if/when prioritized.
      - id: 4.3
        title: Bowling  (10 frames + strike/spare carry-over logic)
        status: done
        notes: >
          Shipped via sixth sibling engine-bowling.js (ADR 0013). Faithful
          X/-/slash notation, strike/spare carry-over (next 1-2 throws),
          special 10th-frame rules. Big-button pin pad (0-10) with
          impossible-throw disabling, undo last throw. No PDF export yet.
      - id: 4.4
        title: Golf  (18 holes — stroke / stableford / match play modes)
        status: partial
        notes: >
          Stroke play shipped (games/golf.js) — same shape as Disc Golf
          but listed separately for discoverability. Stableford (direction
          high, per-hole points) and match-play (count holes won) modes
          remain deferred — would ship as separate game configs since
          their directions differ.
      - id: 4.5
        title: Disc golf  (Golf without the modes)
        status: done
        notes: 18 holes auto-generated from settings.holes; configurable count.
      - id: 4.6
        title: Archery  (arrows per end, 10/9/8/X scoring)
        status: done
        notes: >
          Shipped via rounds engine with 6 arrow inputs per round (one per
          arrow in a standard end). The sum-all-numeric default (ADR 0009)
          turns the 6 arrows into an end total naturally; end totals
          accumulate to the archer total. The original "nested grid"
          deferral turned out unnecessary — multi-field rounds already
          covers it.
      - id: 4.7
        title: 7 Wonders end-game calculator  (military, treasury, wonders, civilian, commerce, guilds, science)
        status: done
        notes: Science scoring (1+4+9+...+7 per set) left to the user — entered as a single number.
      - id: 4.8
        title: Wingspan end-game calculator  (birds, bonus cards, EORs, eggs, food, tucked)
        status: done

  - phase: 5
    title: Pattern 6 — counter-only games (split into 5a done / 5b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 5a (done): new engine-counter.js. Ships Table Tennis,
      Pickleball, Badminton, Volleyball, Catan, Pool (six configs, one
      engine). Phase 5b (deferred): Tennis (nested counter — points →
      games → sets → match) and Backgammon (cube state + gammon
      multipliers) need shape extensions. ADR 0007 explains.
    tasks:
      - id: 5.1
        title: Engine — engine-counter.js (big-button +/- counters, target + winBy)
        status: done
      - id: 5.2
        title: Table tennis / Pickleball / Badminton / Volleyball  (one shared engine, four configs)
        status: done
      - id: 5.3
        title: Tennis  (nested — points → games → sets → match, deuce/advantage logic)
        status: done
        notes: >
          Shipped via fifth sibling engine-tennis.js (ADR 0011). Faithful
          points/games/sets/match nesting with deuce/advantage logic.
          Scope limits documented in tagline: no tiebreak at 6-6
          (advantage set instead), no service indicator, no undo. Each
          is one focused follow-up away.
      - id: 5.4
        title: Pool / 8-ball  (rack counter + fouls)
        status: done
        notes: Modeled as a rack counter (first to N racks). Per-rack ball tracking not included.
      - id: 5.5
        title: Backgammon match play  (cube state, gammon/backgammon)
        status: done
        notes: >
          Shipped as a rounds-engine config — target=7 points, race to
          match length. Per-game value is variable (1 normal, 2 gammon,
          3 backgammon, ×2/×4/×8 with cube doubles); user enters the
          points won per game. The deferred 'cube state tracking' is a
          play-aid (not match scoring) and remains out of scope.
      - id: 5.6
        title: Settlers of Catan  (VP counter + largest army & longest road badges)
        status: done
        notes: Largest army & longest road tracked manually for now — players tap +2 (or use -1 from current holder) when they take the badge.

  - phase: 6
    title: Pattern 5 — session ledgers (split into 6a done / 6b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 6a (done): new engine-ledger.js for cash-game money tracking
      (Poker, Teen Patti). Codenames reclassified as a counter game (it's
      team-wins, not financial). Dispatch generalized into a map.
      Phase 6b (deferred): Chess tournament (matrix + tiebreakers — its
      own shape).
    tasks:
      - id: 6.1
        title: Engine — engine-ledger.js (buy-ins, cash-out, net P&L)
        status: done
      - id: 6.2
        title: Poker session ledger (cash)
        status: done
        notes: Tournament-style (single buy-in, prize structure) not yet supported.
      - id: 6.3
        title: Teen Patti session ledger
        status: done
        notes: Same engine as Poker, ₹ currency, default ₹100 buy-in.
      - id: 6.4
        title: Codenames team-wins counter
        status: done
        notes: >
          Reclassified from "session ledger" to counter engine — Codenames is
          team-wins, not financial. Ships as a counter config with playerNoun
          "Team" and defaultPlayers ["Team Red", "Team Blue"]. See ADR 0008.
      - id: 6.5
        title: Chess tournament tracker  (Swiss / round-robin, tiebreaks)
        status: done
        notes: >
          Shipped as a simple rounds-engine config (ADR 0015). Per round,
          each player enters 2=win / 1=draw / 0=loss (doubled from
          1/0.5/0 for integer arithmetic). Swiss pairings, Buchholz /
          Sonneborn-Berger tiebreakers not auto-computed — separate future
          engine if/when prioritized.

  - phase: 7
    title: Itemized / lookup-table scoring (split into 7a done / 7b deferred)
    status: partial
    deps: [3, 4]
    summary: >
      Phase 7a (done): Cribbage, Pinochle, Scrabble — all expressible as
      rounds with multiple numeric fields after a small engine tweak
      (sum all numeric fields, not just 'score'). ADR 0009.
      Phase 7b (deferred): 7 games needing custom score formulas or
      different shapes (Canasta grid, 500 bid table, Belote, Darts
      countdown, Darts Cricket matrix, Snooker nested, Cricket domain).
    tasks:
      - id: 7.1
        title: Cribbage  (peg + show per hand, first to 121)
        status: done
        notes: User counts pairs/runs/15s/flushes/nobs manually and enters totals; engine sums.
      - id: 7.2
        title: Pinochle  (meld + tricks per hand, first to 150)
        status: done
        notes: 2-team partnership; user counts meld + tricks manually and enters totals.
      - id: 7.3
        title: Canasta
        status: done
        notes: >
          Shipped via computeTotal. Per team per hand: melded card points
          + natural canasta bonus + mixed canasta bonus + red 3s + going
          out − hand penalty. User enters pre-computed bonus values
          (multipliers ×500/×300/×100 are domain knowledge they already
          have at the table). Target 5000.
      - id: 7.4
        title: 500
        status: done
        notes: >
          Shipped via computeTotal (ADR 0012). Bid value alone determines
          tricks needed: floor((bid-40)/100) + 6 for normal bids; misère
          (250) and open misère (500) treated as bid===tricks=0. Made →
          +bid; set → −bid; non-bidder always +10×tricks. 2 teams,
          target 500.
      - id: 7.5
        title: Belote / Coinche
        status: done
        notes: >
          Shipped basic Belote via computeTotal. Per team per hand: declared
          (checkbox), card points won, optional extras (for manual
          declarations/belote bonus). Caller: made (>=82) → keep points + extras;
          set → opponents get 162 + opponents' extras. Coinche (doubling)
          and itemized declarations (belote-rebelote, sequences, carré)
          not auto-computed — enter as 'extras' totals.
      - id: 7.6
        title: Darts 501 / 301 / 701
        status: done
        notes: >
          Shipped via cherry-pick (ADR 0010). Uses rounds engine plus the
          new scoring.displayMode 'remaining' flag for the iconic
          countdown display. Bust handling and double-out finish are
          user-managed (engine doesn't enforce; users enter 0 for bust
          turns).
      - id: 7.7
        title: Darts Cricket
        status: done
        notes: >
          Shipped via seventh sibling engine-darts-cricket.js (ADR 0014).
          Tap-to-mark matrix (player rows × {15–20, Bull}); standard /-X-⊗
          notation; right-click / long-press to remove. Winner = first to
          close all 7. Points-mode (extra hits while opponents haven't
          closed) deferred — v1 is the closing race only.
      - id: 7.8
        title: Snooker
        status: done
        notes: >
          Shipped match-level (first-to-N frames) as a counter game. The
          in-frame break calculator (the iconic 4-147 running total during
          a player's break) is a different artifact — not deferred to ship,
          deferred as out-of-scope for a scoreboard.
      - id: 7.9
        title: Scrabble  (per-turn score, manual game-end)
        status: done
        notes: Single field per turn; user applies multipliers + bingo bonus mentally. No endCondition — leader pulses until manual reset.
      - id: 7.10
        title: Cricket
        status: done
        notes: >
          Shipped match-runs scoreboard (ADR 0015). 2 teams, per innings
          enter total runs. Wickets, overs, batter/bowler figures,
          run-rate, partnerships — out of scope for the scoreboard;
          users track those on a separate scorecard.

  - phase: 8
    title: Heavy / specialty
    status: mostly-done
    deps: [7]
    summary: >
      Originally deferred wholesale (ADR 0010); ADR 0015 reversed that by
      shipping Bridge/Mahjong/Skat as simple rounds configs (user does the
      math). Go/Liar's Dice/President were already shipped via existing
      engines. Werewolf is explicit out-of-scope as a state-tracker, not a
      scorekeeper.
    tasks:
      - id: 8.1
        title: Bridge (rubber)  (bid + contract + vulnerability + slam bonuses)
        status: done
        notes: >
          Shipped as simple rounds-engine config (ADR 0015). Per deal, each
          side enters its own computed score. Contract × vulnerability ×
          doubled × slam math is the user's; engine sums per deal. Rubber
          structure not auto-tracked.
      - id: 8.2
        title: Mahjong  (start with Chinese Classical; defer Japanese riichi)
        status: done
        notes: >
          Shipped as simple rounds-engine config (ADR 0015). Per hand,
          each player enters their net score change. Variant choice
          (Hong Kong, Chinese Classical, Japanese riichi, American) is
          the user's — Scorely doesn't pick one. Engine sums per session.
      - id: 8.3
        title: Skat  (multiplier ladder, failed contracts)
        status: done
        notes: >
          Shipped as simple rounds-engine config (ADR 0015). Per hand,
          enter declarer's net score change (computed via the multiplier
          ladder, which the player owns). 3 players, target 500.
      - id: 8.4
        title: Go  (territory + captures + komi calculator)
        status: done
        notes: >
          Shipped on the rounds engine. 2 players (default Black/White),
          per-game: territory + captures (summed). User adds komi (6.5
          or 7.5) to White's captures manually — keeping that bit of
          domain knowledge with the player rather than baking a fractional
          adjustment into the engine.
      - id: 8.5
        title: Werewolf / Mafia
        status: out-of-scope
        notes: >
          Explicit non-goal (ADR 0015). Werewolf is a state tracker (alive/dead,
          role reveals, day/night phase) rather than a scoreboard; trying to
          make Scorely also track game state would muddy the project's
          identity. A separate "Werewolf moderator" app is the right artifact
          if someone wants this — out of Scorely's scope.
      - id: 8.6
        title: Liar's Dice
        status: done
        notes: >
          Shipped on the rounds engine — threshold-elim + low + displayMode
          'remaining'. Per round = one die-loss event; loser enters 1, others
          leave blank. Threshold = startingDice. Display shows dice left,
          not dice lost. Custom winnerBanner via new engine callback.
      - id: 8.7
        title: President / Asshole
        status: done
        notes: >
          Shipped as rounds engine config — per round, each player enters
          their finishing position (1 = President, … N = Scum). Cumulative
          rank sum, direction low, no endCondition (manual game-end).
          Lower sum = consistently higher finishes.

  - phase: 9
    title: Discovery + UX polish (the 49-game grid is too long to scroll)
    status: planned
    deps: []
    summary: >
      With 49 games shipped, the home grid is now a discovery problem. This
      phase makes the existing games easier to find, faster to launch, and
      stickier to use. No new games — pure UX. Tasks 9.1–9.4 are the
      "recommended first bundle" (~4h total); the rest are individually
      valuable but not co-dependent.
    bundles:
      first-bundle: [9.1, 9.2, 9.3, 9.4]
    tasks:
      - id: 9.1
        title: Search box on the home grid
        status: done
        notes: >
          Shipped — live-filter search input above the All-games grid in
          app.js. Matches name + tagline + categories case-insensitively.
          Shows "X of N" counter. Query persists to
          scorely:home-search:v1.

      - id: 9.2
        title: Category chips + per-game categories
        status: done
        notes: >
          Shipped — central GAME_CATEGORIES map in app.js (one source of
          truth, no 49-file edits). 7 chips: Cards, Dice, Tile, Sports,
          Board, Party, Partner. Multi-select; "All" chip resets.
          Persists active set to scorely:home-categories:v1.

      - id: 9.3
        title: Recent games row
        status: done
        notes: >
          Shipped — Scorely.touchGame(id) stamps lastOpenedAt in
          scorely:recent:v1 on each game launch. Home renders the top
          5 most-recent in a "Recent" section above the All games grid.
          Filtered out if a recent id no longer exists in the registry.

      - id: 9.4
        title: Player name autocomplete across games
        status: done
        notes: >
          Shipped — Scorely.recordPlayerName(name) maintains a global
          dictionary at scorely:player-names:v1 (capped at 100 most-recent
          unique names). Every engine's "Add player" input now has
          list="player-names"; a global <datalist> in index.html is
          repopulated on the home render (and could be refreshed mid-game
          via Scorely.refreshPlayerDatalist).

      - id: 9.5
        title: Favorites — star a game, pin to top
        status: done
        notes: >
          Shipped. Star button per game card; click stops navigation,
          toggles via Scorely.toggleFavorite. Favorites section renders
          above Recent on home (only when at least one favorite exists).
          Persists to scorely:favorites:v1. CSS pop animation on toggle.

      - id: 9.6
        title: Rules popover per game
        status: done
        notes: >
          Shipped. games-rules.js holds a central Scorely.rules map
          (rules as arrays of bullets, ~3-5 lines per game). All 49
          games covered. Game card gets a "?" button (top-right next
          to the star) that opens a styled modal with the rules and a
          "Play X →" CTA. Modal closes on backdrop click, X button,
          or Escape key.

      - id: 9.7
        title: PWA — installable + offline
        status: done
        notes: >
          Shipped. manifest.json + icon.svg (brand-gradient 'S') for
          installability. sw.js uses stale-while-revalidate — caches
          every same-origin GET on first visit so the app works offline
          afterward. iOS meta tags + viewport-fit safe-area padding so
          notched devices render correctly. CACHE_VERSION = 'scorely-v1';
          bump to force clients to drop their caches.

      - id: 9.8
        title: Game discovery — "you played X, try Y"
        status: done
        notes: >
          Shipped. Auto-derived from shared GAME_CATEGORIES (no per-game
          curation). After the engine mounts on a game page, app.js
          appends an "If you like <Name>, try…" card with up to 3
          related games ranked by category-overlap count. Stable order
          via Scorely.games registration order. Manual override
          (config.related: [...]) is a future polish if auto-derived
          recommendations feel off.

      - id: 9.9
        title: Print stylesheet
        status: done
        notes: >
          Shipped. One @media print block at the end of styles.css.
          White bg, black text, all animations/shadows/gradients stripped.
          Hides chrome (back-nav, setup, round form, related card, footer,
          interactive buttons + inputs). Keeps the scoreboard table,
          totals, status list, winner banner, and per-engine displays
          (bowling frames, darts cells, ledger chips, scorecards, tennis
          match). Cards collapse to plain printable blocks with
          page-break-inside: avoid. Cmd+P on any game page gives a
          clean scoresheet.

      - id: 9.10
        title: Game stats / hall of fame
        status: done
        notes: >
          Shipped at #/stats. Reads every scorely:<gameId>:v1 key plus
          scorely:recent:v1 for last-opened timestamps. Aggregates by
          normalized (lowercase-trimmed) player name. Shows three tiles
          (games tracked / unique players / total games), a top-12
          players leaderboard with medals 🥇🥈🥉 by appearance count,
          and a per-game breakdown listing each saved game's players
          and when it was last opened. Linked from the home footer.
          v1 omits exact winner tracking (would need per-engine
          shape switches) — a future polish.

      - id: 9.11
        title: Tournament / game-night mode
        status: done
        notes: >
          Shipped pragmatically as games/tournament.js — a rounds-engine
          config with the same group of players across many "games"
          (each round). Per round, enter each player's points (raw game
          score, rank, F1 formula, etc.). Engine sums, highest wins.
          Auto-pulling results from other Scorely game instances (the
          aspirational version) is deferred — would need per-engine
          winner detection (same blocker as 9.10 stats). Now lives on
          the home grid as the 50th shipped game.

      - id: 9.12
        title: Sound effects (toggleable, opt-in)
        status: done
        notes: >
          Shipped. Web Audio API synthesis (no asset deps): short sine
          tap (880Hz, 80ms envelope) on score events; ascending C-major
          arpeggio (C5-E5-G5-C6 triangle waves) on winner. Hooked into
          counter +1/-1, tennis +POINT, darts mark, bowling throw,
          rounds form submit, and into fireConfetti. Floating 🔇/🔊
          toggle button top-right with backdrop blur, persists state
          to scorely:sound:v1, defaults to OFF. First toggle-on resumes
          the AudioContext (browser autoplay-policy). Hidden in print.

      - id: 9.13
        title: Custom game builder (stretch)
        status: done
        notes: >
          Shipped at #/create-game. Form fields: name, icon (emoji),
          tagline, win condition (race-to-target / out-at-threshold /
          no-auto-winner), target value. On submit: generates a
          rounds-engine config, registers via Scorely.defineGame,
          persists to scorely:custom-games:v1, navigates to the new
          game. Custom games hydrate on app load (via
          Scorely.hydrateCustomGames before first render) so they
          survive refresh and appear in the home grid alongside
          built-ins. The same page lists existing customs with delete
          buttons (removes config + scorely:<id>:v1 saved state).
          Multi-field rounds, computeTotal callbacks, engine-shape
          selection are out of scope for v1 — power users can
          hand-write a config file. Linked from home footer.

      - id: 9.14
        title: Documentation refresh after Phase 9
        status: done
        notes: >
          Done. Comprehensive pass:
          - CLAUDE.md: rewrote the overview to reflect 49+ games and
            the seven-engine architecture; new 'Files' section lists
            every engine + role; new 'State and storage' table covers
            the 7 cross-cutting localStorage keys.
          - docs/architecture.md: routing now shows all four routes
            (#/, #/<game>, #/stats, #/create-game) in a table; new
            'Cross-cutting helpers' section enumerates every Scorely.*
            API added in Phase 9 (favorites, recent, player-names,
            sound, custom games, confetti).
          - docs/games.md: header reads '49 of 50 shipped' with the
            Werewolf out-of-scope exception called out; new ⛔ legend
            entry.
          - docs/hosting.md: 'Current setup' table adds the PWA row;
            new paragraph about installability + service-worker caching.
          - docs/README.md: index re-sequenced (architecture first,
            then games, conventions, hosting, decisions); stale
            duplicate row for conventions.md removed.

# Estimated game counts per phase (excludes engine work):
#   Phase 2:  8 games
#   Phase 3:  8 games
#   Phase 4:  7 games
#   Phase 5:  6 games (4 sport counters under one shared component)
#   Phase 6:  4 games
#   Phase 7: 10 games
#   Phase 8:  7 games
#   Total:  50 games + 1 already shipped (49 of 50 actually built; Werewolf out-of-scope)
#
# Phase 9: 13 UX/discovery tasks — no new games, all polish on the 49-game grid.
# Phase 10: Cricket Match Scoreboard — 1 major new engine + every deferred/partial item from Phases 2–9.

  - phase: 10
    title: Cricket Match Scoreboard
    status: planned
    deps: []
    summary: >
      The single biggest pending feature — a real ball-by-ball cricket engine
      (ADR 0016) — plus every deferred, partial, and follow-up item that was
      explicitly punted from Phases 2–9. All collected here so there is one
      place to look for outstanding work. Tasks are independent; pick up any
      one when a real user asks or when it unblocks something else.

    tasks:

      # ── CRICKET ENGINE (the anchor feature of this phase) ──────────────────

      - id: 10.1
        title: "engine-cricket.js — ball-by-ball engine (eighth sibling)"
        status: planned
        notes: >
          Core new engine per ADR 0016. Manages match state: setup →
          toss → batting → complete. Ball-by-ball entry panel
          (W · 0 · 1 · 2 · 3 · 4 · 6 · WD · NB · B · LB · Pen).
          Derived stats (batter, bowler, partnership, over summary)
          computed from balls[] — never stored. See ADR 0016 for full
          state shape and consequences.

      - id: 10.2
        title: Match setup UI — two teams, rosters, match type, overs
        status: planned
        notes: >
          Setup screen: team names, player roster entry (names),
          match type selector (T20 / ODI / Test / Custom), overs limit.
          Feeds into state.teams and state.settings. Wired to
          engine-cricket.js createCricketInstance().

      - id: 10.3
        title: Toss & batting-order screen
        status: planned
        notes: >
          Two-step: (1) which team won toss, (2) elected to bat or field.
          Determines innings[0].battingTeam / bowlingTeam. First two
          batters and first bowler are selected here.

      - id: 10.4
        title: Ball-by-ball entry panel
        status: planned
        notes: >
          Big-button row: W · 0 · 1 · 2 · 3 · 4 · 6 · WD · NB · B · LB · Pen.
          On W: open wicket dialog (dismissal type, fielder, next batter).
          On over end: prompt for new bowler. Extras (WD/NB) do not
          advance the legal-ball count. Undo last ball button.

      - id: 10.5
        title: Wicket dialog — dismissal type, fielder(s), next batter
        status: planned
        notes: >
          Modal on W press. Dismissal types: Bowled, Caught, LBW, Run Out,
          Stumped, Hit Wicket, Ret Hurt, Obstructed. Optional fielder name
          (from bowling team roster). Next batter selector from remaining
          batting roster. Bowler gets wicket credit except Run Out / Ret Hurt.

      - id: 10.6
        title: Live scorecard — batting card + bowling card + current over
        status: planned
        notes: >
          Batting card: each batter's runs / balls / 4s / 6s / SR /
          dismissal. Bowling card: each bowler's O / M / R / W / Econ.
          Current over: ball-by-ball symbols (· / 1 / 2 / 4 / 6 / W /
          wd / nb / b / lb). Current partnership runs + balls.
          All derived in real-time from innings.balls[].

      - id: 10.7
        title: Fall of wickets list
        status: planned
        notes: >
          Ordered list: wicket# → score at fall → batter name → over.
          Derived from balls[] where ball.wicket != null.
          Rendered below the batting card.

      - id: 10.8
        title: Over-by-over analysis table
        status: planned
        notes: >
          One row per completed over: over#, bowler, runs, wickets,
          dot balls, boundaries. Derived from balls[] grouped by
          ball.over. Useful post-match review.

      - id: 10.9
        title: Innings switch — second innings setup + target display
        status: planned
        notes: >
          Auto-prompt when first innings ends (all-out or overs complete).
          Second innings: show target (first innings total + 1), flip
          batting/bowling teams, select opening pair and first bowler.
          Live required-run-rate and runs-remaining shown in header.

      - id: 10.10
        title: Match result declaration
        status: planned
        notes: >
          Trigger: target chased (team wins by N wickets) or second
          innings complete (team wins by N runs, or tie, or draw for
          Test). Winner banner consistent with other engines. Match
          summary: both innings totals, top scorer, best bowler.

      - id: 10.11
        title: Shot type picker (optional per ball)
        status: planned
        notes: >
          Optional enrichment layer after each ball entry.
          Options: Drive, Cut, Pull, Hook, Flick, Glance, Sweep,
          Slog, Defensive, Leave, Other. Stored as ball.shot.
          Shown in per-batter breakdown post-innings.

      - id: 10.12
        title: Wagon wheel zone picker (optional per ball)
        status: planned
        notes: >
          8-zone ground map: cover, mid-off, mid-on, mid-wicket,
          square leg, fine leg, third man, point. Stored as ball.zone.
          v1: radio buttons or a simple grid. v2: SVG field diagram
          with tap zones (follow-up task 10.13).

      - id: 10.13
        title: Wagon wheel SVG field diagram — interactive zone tap
        status: planned
        notes: >
          Follow-up to 10.12. Replace the radio-button zone picker with
          an SVG cricket field with 8 tappable sectors. Tap a sector →
          sets ball.zone. Renders post-innings as a heat-map overlay
          (dot size or colour intensity = hit count per zone).
          Deferred from ADR 0016 follow-up list.

      - id: 10.14
        title: Cricket scorecard PDF export
        status: planned
        notes: >
          Full scorecard as printable PDF via jsPDF + autoTable.
          Two tables per innings (batting + bowling), fall of wickets,
          over analysis. Complex layout — deferred from ADR 0016.
          Blocked on 10.1–10.10 being done first.

      - id: 10.15
        title: Update games/cricket.js to use engine-cricket shape
        status: planned
        notes: >
          Replace the current trivial rounds config with
          shape: 'cricket' and a richer tagline. Update app.js
          dispatch map: cricket → Scorely.createCricketInstance.
          Add <script src="engine-cricket.js"> in index.html
          before app.js. Update games-rules.js entry.

      - id: 10.16
        title: Write docs/games/cricket.md
        status: planned
        notes: >
          Document the cricket engine: state shape, derived-stats
          contract, UI flow, known limits (no DRS, no powerplay
          enforcement, no LBW prediction). Per documentation rule.

      # ── DEFERRED POLISH FROM PHASE 2 ───────────────────────────────────────

      - id: 10.17
        title: "Rummy: drop quick-fill buttons (20 first drop / 40 middle drop)"
        status: planned
        notes: >
          Deferred from task 2.2. Two quick-fill buttons per player row
          in the round-entry form: "Drop 20" and "Drop 40". Fills that
          player's score field with the appropriate drop penalty so
          users don't type it manually. Small engine extension or pure
          UI widget in games/rummy.js.

      - id: 10.18
        title: "Tonk: stake multiplier (double on spread, triple on 49)"
        status: planned
        notes: >
          Deferred from task 2.4. Optional stake field in settings;
          multiplier applied to net chip count per hand. Requires either
          a computeTotal callback or a new config primitive for
          per-round stake scaling. Out of scope for the pure-config
          engine at Phase 2 time — now addressable via computeTotal.

      # ── DEFERRED POLISH FROM PHASE 3 ───────────────────────────────────────

      - id: 10.19
        title: "Hearts: shoot-the-moon one-click UX (26 to all others)"
        status: planned
        notes: >
          Deferred from task 3.3. When a player shoots the moon, they
          score 0 and all other players get 26 added automatically.
          Currently users enter 0/26 manually. Add a "🌙 Shoot the moon"
          button in the round-entry form that fills 0 for the active
          player and 26 for all others.

      - id: 10.20
        title: "Court Piece: auto kot-bonus (double on 7–0 sweep)"
        status: planned
        notes: >
          Deferred from task 3.5. When one team wins all 7 hands in a
          deal (a "kot"), their score doubles. Currently tracked manually.
          Add a "Kot!" checkbox per round that triggers the 2× multiplier
          in a computeTotal callback.

      # ── DEFERRED POLISH FROM PHASE 4 ───────────────────────────────────────

      - id: 10.21
        title: "Golf: Stableford mode (direction high, per-hole points)"
        status: planned
        notes: >
          Deferred from task 4.4 (partial). Stableford assigns points
          per hole based on net score vs par (eagle=4, birdie=3,
          par=2, bogey=1, double bogey+=0). Ships as a separate game
          config stableford-golf or as a mode selector inside golf.js
          with direction: 'high' and per-hole point lookup.

      - id: 10.22
        title: "Golf: match-play mode (count holes won, not strokes)"
        status: planned
        notes: >
          Deferred from task 4.4 (partial). Match play counts holes won
          vs lost vs halved; result is expressed as "3&2" (3 up with 2
          to play). A fundamentally different shape from stroke play —
          likely its own config with endCondition based on hole-lead
          and remaining holes. Ships as a separate config match-golf.

      - id: 10.23
        title: "Yahtzee: engine-side upper-section bonus auto-derivation (+35 if upper ≥ 63)"
        status: planned
        notes: >
          Deferred from task 4.2. Currently the user manages the +35
          bonus manually in a 'Bonuses' category. A future engine
          extension to engine-grid.js could auto-sum upper categories
          and inject the bonus when the threshold is met. Low priority
          — the manual workaround is well-documented and works fine.

      - id: 10.24
        title: "Bowling: PDF scorecard export"
        status: planned
        notes: >
          Deferred from task 4.3. The bowling engine has X/spare/number
          notation and cumulative frame scores — a printable scorecard
          is a natural follow-up. Blocked on the complex 10-frame + 10th
          special-frame table layout in jsPDF/autoTable.

      # ── DEFERRED POLISH FROM PHASE 5 ───────────────────────────────────────

      - id: 10.25
        title: "Tennis: tiebreak at 6-6 (7-point or 10-point match tiebreak)"
        status: planned
        notes: >
          Deferred from task 5.3. Currently the engine plays advantage
          sets (no tiebreak). A 7-point tiebreak at 6-6 is the standard
          tour rule; a 10-point match tiebreak replaces the third set in
          many modern formats. Requires a new sub-mode in engine-tennis.js
          — the most-requested follow-up for that engine.

      - id: 10.26
        title: "Tennis: service indicator (who is serving)"
        status: planned
        notes: >
          Deferred from task 5.3. A simple ball/dot marker next to the
          server's name. Service changes on every game, and sides at
          every set. Pure display state derived from game count parity
          — no scoring logic changes needed.

      - id: 10.27
        title: "Tennis: undo last point"
        status: planned
        notes: >
          Deferred from task 5.3. The engine has no undo path — a miss-tap
          on +POINT is permanent. Store the last ball in a one-deep undo
          buffer; an "Undo" button replays the inverse transition. More
          complex than other engines because tennis state is a nested FSM
          (points → games → sets).

      # ── DEFERRED POLISH FROM PHASE 6 ───────────────────────────────────────

      - id: 10.28
        title: "Poker: tournament mode (single buy-in, prize structure)"
        status: planned
        notes: >
          Deferred from task 6.2. Cash-game ledger is live. Tournament
          mode is different: one buy-in per player, optional re-buys,
          prize pool split by finishing position. Likely a separate
          game config (poker-tournament) rather than a mode flag inside
          the ledger engine.

      - id: 10.29
        title: "Chess: Swiss pairings + Buchholz / Sonneborn-Berger tiebreakers"
        status: planned
        notes: >
          Deferred from task 6.5. Currently a simple rounds config —
          per round, each player enters 2/1/0. Proper Swiss pairings
          (avoid repeat opponents, pair by score group) and Buchholz /
          SB tiebreakers require a dedicated pairing engine. Separate
          future engine if/when prioritized.

      # ── DEFERRED POLISH FROM PHASE 7 ───────────────────────────────────────

      - id: 10.30
        title: "Darts Cricket: points mode (score while opponents haven't closed)"
        status: planned
        notes: >
          Deferred from task 7.7. v1 is the closing race only — first
          player to close all 7 numbers wins. Points mode adds: hitting
          an already-closed number scores points (×value) while opponents
          haven't closed it yet; highest score wins if everyone closes.
          Requires extending engine-darts-cricket.js with a per-number
          points counter per player.

      - id: 10.31
        title: "Belote / Coinche: itemized declarations (belote-rebelote, sequences, carré)"
        status: planned
        notes: >
          Deferred from task 7.5. Currently users total their declaration
          points and enter as 'extras'. Auto-itemizing (belote-rebelote
          = 20, sequence of 3 = 20, carré = 100/150/200 depending on rank)
          would need a declaration picker dialog per hand. Medium complexity.

      - id: 10.32
        title: "Belote / Coinche: Coinche doubling (×2 / ×4 redouble)"
        status: planned
        notes: >
          Deferred from task 7.5. Coinche lets the opposing team double
          the contract value; re-coinche quadruples it. Requires a
          per-hand 'doubled' flag in the round input and a multiplier
          in the computeTotal formula.

      # ── DEFERRED POLISH FROM PHASE 8 ───────────────────────────────────────

      - id: 10.33
        title: "Bridge: rubber structure auto-tracking (game points, honours, above/below line)"
        status: planned
        notes: >
          Deferred from task 8.1. Currently each side enters their
          computed score per deal. Full rubber bridge tracks: trick score
          (below the line), bonuses above the line, game/rubber completion,
          vulnerability state. Requires a computeTotal callback or a
          dedicated engine that understands the above/below distinction.

      - id: 10.34
        title: "Mahjong: variant-specific scoring tables (Hong Kong, Japanese riichi)"
        status: planned
        notes: >
          Deferred from task 8.2. Currently a free-form rounds entry.
          Variant-specific scoring means a yaku/fan table lookup for
          Japanese riichi (e.g., tanyao=1 han, pinfu=1 han → fu×2^(han+2)×4)
          or doubles/limit hands for Hong Kong mahjong. Separate game
          configs per variant is the cleanest approach.

      # ── DEFERRED POLISH FROM PHASE 9 ───────────────────────────────────────

      - id: 10.35
        title: "Stats (#/stats): per-game winner tracking"
        status: planned
        notes: >
          Deferred from task 9.10. v1 aggregates by player appearance
          (name seen in any saved game). True winner tracking needs
          per-engine shape detection to extract who won from each
          saved state key. Requires a normalised winner field in every
          engine's persisted state or a per-engine getWinner() export.

      - id: 10.36
        title: "Tournament mode: auto-pull results from other Scorely game instances"
        status: planned
        notes: >
          Deferred from task 9.11. Currently per-round scores are entered
          manually. The aspirational flow: finish a game in another tab →
          Tournament auto-reads that game's winner and awards points.
          Requires per-engine winner detection (same blocker as 10.35)
          and a cross-game event bus or polling loop.

      - id: 10.37
        title: "Game discovery: manual related-games override (config.related: [...])"
        status: planned
        notes: >
          Deferred from task 9.8. Related games are auto-derived from
          category overlap. If the auto-derived suggestions feel off for
          a specific game, a config.related: ['game-id', ...] array
          overrides the algorithm. Low priority — auto-derived is good
          enough for most games.

      - id: 10.38
        title: "Custom game builder: multi-field rounds + engine-shape selector"
        status: planned
        notes: >
          Deferred from task 9.13. v1 only generates a basic rounds
          config (single score field, no formula). Power-user extensions:
          multiple round fields, computeTotal callback, choice of
          engine shape (counter, grid, ledger, cricket). Likely ships
          as an "Advanced" toggle in the #/create-game form.
