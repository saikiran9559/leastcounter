# Scorely — phased implementation plan
#
# Living document. Update whenever a task or phase changes status. Detailed
# per-game scoring rules and complexity tiers live in docs/games.md; the
# seven shared UI patterns are listed at the bottom of that file and are
# the unit of phase-planning here.
#
# Status legend:
#   done         — shipped to main
#   in-progress  — actively being worked on; ideally only one task at a time
#   planned      — queued, not started
#   blocked      — waiting on a dep or a decision; record the blocker in `notes`
#
# How to update:
#   - On starting a task, set its status to in-progress.
#   - On shipping, set to done and bump `updated` at the top.
#   - If a task triggers an architectural decision, write an ADR in
#     docs/decisions/ — don't bury the rationale in this file.

project: Scorely
updated: 2026-06-07
live_url: https://saikiran9559.github.io/scorely/
repo: saikiran9559/scorely

current_phase: cherry-pick
next_up: by-demand
notes: >
  Strict phase order ended after Phase 7a. Per ADR 0010, future games
  are picked by demand × engine-fit rather than phase number.
  Cherry-picked this batch: Yahtzee (4b) and Darts 501 (7b) — both
  doable with tiny engine adjustments (4b: none; 7b: scoring.displayMode
  'remaining').
  Phase 8 (heavy/specialty) deferred WHOLESALE — each task there needs
  bespoke domain code (Bridge contract calc, Mahjong fan tables, etc.).
  Per-game notes spell out what would be needed if any of them ever
  gets prioritized.
  Open work: Phase 3b/4b (rest)/5b/6b/7b (rest)/Phase 8. Take the next
  pick by demand, not by phase number.

phases:

  - phase: 0
    title: Foundation
    status: done
    summary: >
      Ship Least Count end-to-end, set up deploy + docs + rules infrastructure,
      and establish the multi-game vision.
    tasks:
      - id: 0.1
        title: Build Least Count scoreboard
        status: done
      - id: 0.2
        title: PDF export of results (jsPDF + autoTable)
        status: done
      - id: 0.3
        title: Deploy to GitHub Pages under saikiran9559/scorely
        status: done
      - id: 0.4
        title: UI animations (card load, chip pop-in, row slide-in, total flash, winner pop)
        status: done
      - id: 0.5
        title: Catalog candidate games (docs/games.md)
        status: done
      - id: 0.6
        title: Establish rules (.claude/rules/) — deploy-sync + documentation
        status: done
      - id: 0.7
        title: Establish docs/ folder with README and first ADR
        status: done
      - id: 0.8
        title: Rename repo from leastcounter to scorely
        status: done

  - phase: 1
    title: Reusable scoring engine
    status: done
    deps: []
    summary: >
      Extracted the Least Count code into a generic engine in engine.js.
      Games are declarative configs (Scorely.defineGame). Hash router added
      (#/, #/<game-id>) with home screen. UNO shipped as second game to
      validate the engine API. ADR 0003 captures the design rationale.
    goals:
      - Game-agnostic state shape (players, rounds, totals, win condition)  # done
      - Hash-based router so each game lives at /#/<game-slug>                # done
      - Game registry + home screen listing available games                   # done
      - Least Count refactored as the proof-of-concept consumer              # done
      - Storage keys namespaced as scorely:<game>:v1                          # done
    tasks:
      - id: 1.1
        title: Design engine API — what's game-agnostic vs game-specific
        status: done
        notes: Config-driven (direction × endCondition matrix). See ADR 0003.
      - id: 1.2
        title: Hash router (#/least-count, #/uno, ...) with browser back/forward
        status: done
      - id: 1.3
        title: Game registry + home screen listing available games
        status: done
      - id: 1.4
        title: Refactor Least Count to consume the engine
        status: done
      - id: 1.5
        title: Migrate localStorage to scorely:<game>:v1 with read-fallback from leastcounter:v1
        status: done
      - id: 1.6
        title: Write docs/architecture.md + ADR for engine API
        status: done

  - phase: 2
    title: Pattern 1+2 — cumulative scoring games (easy wins)
    status: done
    deps: [1]
    summary: >
      Highest leverage phase: 8 games shipped as thin engine configs. Patterns
      1 (lowest wins, threshold elimination) and 2 (highest wins, race to target)
      are the engine's native shape, so each game here should be <1 day.
    tasks:
      - id: 2.1
        title: UNO  (pattern 2, target 500)
        status: done
        notes: Shipped in Phase 1 as engine-validation second game per ADR 0002.
      - id: 2.2
        title: Rummy — Indian 13-card  (pattern 1, threshold 101/201, per-round cap 80, drop = 20/40)
        status: done
        notes: >
          Shipped with engine extension `roundInputMax` for the 80-point cap.
          Drop quick-fill buttons (20/40) deferred to a future polish pass.
      - id: 2.3
        title: Crazy Eights / Switch  (pattern 1)
        status: done
      - id: 2.4
        title: Tonk  (pattern 1, optional stake multiplier)
        status: done
        notes: Stake multiplier deferred — out of scope for the pure-config engine.
      - id: 2.5
        title: Phase 10  (pattern 1 + per-player phase column)
        status: done
        notes: >
          Shipped with engine extension: roundInputs schema (multi-field
          per-player per-round) + progress-reach endCondition. Round data
          model migrated from r.scores to r.entries with backwards-compat
          read fallback. See ADR 0004.
      - id: 2.6
        title: Dominoes  (pattern 1)
        status: done
      - id: 2.7
        title: Rummikub  (pattern 1)
        status: done
      - id: 2.8
        title: Farkle / Ten Thousand  (pattern 2, target 10000)
        status: done

  - phase: 3
    title: Pattern 4 — team / partnership games (split into 3a done / 3b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 3a (done): light team support via playerNoun/defaultPlayers,
      threshold-end endCondition for Hearts. Ships Hearts, Mendikot, Court
      Piece. Phase 3b (deferred): partnership games (Spades, 28/29, Euchre,
      Pitch, Whist) need per-round score formulas — a callback or a new
      config primitive. See ADR 0005.
    tasks:
      - id: 3.1
        title: Engine — playerNoun + defaultPlayers + threshold-end (Phase 3a slice)
        status: done
        notes: Full team-layout (per-team player rosters) deferred to Phase 3b.
      - id: 3.2
        title: Spades  (bid + tricks + bag-overflow penalty)
        status: done
        notes: >
          Shipped via per-game computeTotal callback (ADR 0012, partial
          revision of ADR 0003). 2 teams via playerNoun, bid+tricks per
          hand, computeTotal walks rounds applying the bid×10 + bags
          formula with 10-bag -100 penalty. formatRoundCell shows "B/T"
          (bid/tricks) per cell.
      - id: 3.3
        title: Hearts  (shoot-the-moon toggle, 4 players, no teams)
        status: done
        notes: >
          Shipped via threshold-end + low. Shoot-the-moon UX (one-click 26-to-others)
          is a future polish — users currently enter 0/26 manually.
      - id: 3.4
        title: 28 / 29 / 56  (Indian trick-taking, bid + trump + result)
        status: deferred
        notes: Per-round score formula (bid value × made/set).
      - id: 3.5
        title: Court Piece / Rang / Hokm  (hands-won + kot bonus)
        status: done
        notes: Kot bonus tracked manually for now — the engine doesn't auto-double on a 7-0 sweep.
      - id: 3.6
        title: Mendikot  (tens + tricks)
        status: done
        notes: Modeled as 2-team target-reach on hands-won. Tens-captured detail not stored separately.
      - id: 3.7
        title: Euchre  (maker + tricks + march + loner)
        status: done
        notes: >
          Shipped as plain config — no formula needed. Per hand, user enters
          the team's points (1 / 2 / 4) directly into the score field; engine
          sums. Distinguishing march vs loner is left to the user (the
          tagline reminds them which case maps to which value).
      - id: 3.8
        title: Pitch / Setback  (named-bonus scoring — high/low/jack/game)
        status: done
        notes: >
          Shipped via computeTotal (ADR 0012). Two roundInputs per team
          (bid + bonuses-won). If bid > 0 (bidder team): bonuses ≥ bid →
          +bonuses, else −bid. Non-bidder team always +bonuses.
          formatRoundCell shows "bid N · M" for the bidding team.
      - id: 3.9
        title: Whist (rubber)
        status: deferred
        notes: Nested counters (5 points = a game, 2 games = a rubber) — distinct from the flat-counter shape the engine supports today.

  - phase: 4
    title: Pattern 3 — fixed-category grid games (split into 4a done / 4b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 4a (done): new engine-grid.js for sum-of-categories games.
      Ships Wingspan, 7 Wonders, Disc Golf. Phase 4b (deferred): Yahtzee,
      Bowling, Golf-with-modes, Archery — each needs an extension beyond
      simple summing (section bonuses, frame carry-over, scoring modes,
      nested grids). See ADR 0006.
    tasks:
      - id: 4.1
        title: Engine — engine-grid.js (sum-of-categories shape)
        status: done
        notes: Derived/bonus categories (Yahtzee upper bonus, Yahtzee jokers) deferred to 4b.
      - id: 4.2
        title: Yahtzee
        status: done
        notes: >
          Shipped on the existing grid engine via cherry-pick (ADR 0010).
          Upper-section bonus (+35) and Yahtzee bonuses (+100 each) are
          tracked in a user-managed 'Bonuses' category — engine does not
          auto-compute them. Engine-side auto-derivation is a future
          extension if/when prioritized.
      - id: 4.3
        title: Bowling  (10 frames + strike/spare carry-over logic)
        status: done
        notes: >
          Shipped via sixth sibling engine-bowling.js (ADR 0013). Faithful
          X/-/slash notation, strike/spare carry-over (next 1-2 throws),
          special 10th-frame rules. Big-button pin pad (0-10) with
          impossible-throw disabling, undo last throw. No PDF export yet.
      - id: 4.4
        title: Golf  (18 holes — stroke / stableford / match play modes)
        status: deferred
        notes: Stroke mode is trivially the same as Disc Golf; stableford/match-play modes need per-mode computation.
      - id: 4.5
        title: Disc golf  (Golf without the modes)
        status: done
        notes: 18 holes auto-generated from settings.holes; configurable count.
      - id: 4.6
        title: Archery  (arrows per end, 10/9/8/X scoring)
        status: deferred
        notes: Multi-input per category (6 arrows × N ends) — nested grid shape.
      - id: 4.7
        title: 7 Wonders end-game calculator  (military, treasury, wonders, civilian, commerce, guilds, science)
        status: done
        notes: Science scoring (1+4+9+...+7 per set) left to the user — entered as a single number.
      - id: 4.8
        title: Wingspan end-game calculator  (birds, bonus cards, EORs, eggs, food, tucked)
        status: done

  - phase: 5
    title: Pattern 6 — counter-only games (split into 5a done / 5b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 5a (done): new engine-counter.js. Ships Table Tennis,
      Pickleball, Badminton, Volleyball, Catan, Pool (six configs, one
      engine). Phase 5b (deferred): Tennis (nested counter — points →
      games → sets → match) and Backgammon (cube state + gammon
      multipliers) need shape extensions. ADR 0007 explains.
    tasks:
      - id: 5.1
        title: Engine — engine-counter.js (big-button +/- counters, target + winBy)
        status: done
      - id: 5.2
        title: Table tennis / Pickleball / Badminton / Volleyball  (one shared engine, four configs)
        status: done
      - id: 5.3
        title: Tennis  (nested — points → games → sets → match, deuce/advantage logic)
        status: done
        notes: >
          Shipped via fifth sibling engine-tennis.js (ADR 0011). Faithful
          points/games/sets/match nesting with deuce/advantage logic.
          Scope limits documented in tagline: no tiebreak at 6-6
          (advantage set instead), no service indicator, no undo. Each
          is one focused follow-up away.
      - id: 5.4
        title: Pool / 8-ball  (rack counter + fouls)
        status: done
        notes: Modeled as a rack counter (first to N racks). Per-rack ball tracking not included.
      - id: 5.5
        title: Backgammon match play  (cube state, gammon/backgammon)
        status: done
        notes: >
          Shipped as a rounds-engine config — target=7 points, race to
          match length. Per-game value is variable (1 normal, 2 gammon,
          3 backgammon, ×2/×4/×8 with cube doubles); user enters the
          points won per game. The deferred 'cube state tracking' is a
          play-aid (not match scoring) and remains out of scope.
      - id: 5.6
        title: Settlers of Catan  (VP counter + largest army & longest road badges)
        status: done
        notes: Largest army & longest road tracked manually for now — players tap +2 (or use -1 from current holder) when they take the badge.

  - phase: 6
    title: Pattern 5 — session ledgers (split into 6a done / 6b deferred)
    status: partial
    deps: [1]
    summary: >
      Phase 6a (done): new engine-ledger.js for cash-game money tracking
      (Poker, Teen Patti). Codenames reclassified as a counter game (it's
      team-wins, not financial). Dispatch generalized into a map.
      Phase 6b (deferred): Chess tournament (matrix + tiebreakers — its
      own shape).
    tasks:
      - id: 6.1
        title: Engine — engine-ledger.js (buy-ins, cash-out, net P&L)
        status: done
      - id: 6.2
        title: Poker session ledger (cash)
        status: done
        notes: Tournament-style (single buy-in, prize structure) not yet supported.
      - id: 6.3
        title: Teen Patti session ledger
        status: done
        notes: Same engine as Poker, ₹ currency, default ₹100 buy-in.
      - id: 6.4
        title: Codenames team-wins counter
        status: done
        notes: >
          Reclassified from "session ledger" to counter engine — Codenames is
          team-wins, not financial. Ships as a counter config with playerNoun
          "Team" and defaultPlayers ["Team Red", "Team Blue"]. See ADR 0008.
      - id: 6.5
        title: Chess tournament tracker  (Swiss / round-robin, tiebreaks)
        status: deferred
        notes: Matrix shape + Buchholz/Sonneborn-Berger tiebreakers — its own engine when prioritized.

  - phase: 7
    title: Itemized / lookup-table scoring (split into 7a done / 7b deferred)
    status: partial
    deps: [3, 4]
    summary: >
      Phase 7a (done): Cribbage, Pinochle, Scrabble — all expressible as
      rounds with multiple numeric fields after a small engine tweak
      (sum all numeric fields, not just 'score'). ADR 0009.
      Phase 7b (deferred): 7 games needing custom score formulas or
      different shapes (Canasta grid, 500 bid table, Belote, Darts
      countdown, Darts Cricket matrix, Snooker nested, Cricket domain).
    tasks:
      - id: 7.1
        title: Cribbage  (peg + show per hand, first to 121)
        status: done
        notes: User counts pairs/runs/15s/flushes/nobs manually and enters totals; engine sums.
      - id: 7.2
        title: Pinochle  (meld + tricks per hand, first to 150)
        status: done
        notes: 2-team partnership; user counts meld + tricks manually and enters totals.
      - id: 7.3
        title: Canasta
        status: deferred
        notes: Many itemized bonuses (red threes, clean/dirty canastas, going-out, hand penalty) — grid card per hand.
      - id: 7.4
        title: 500
        status: done
        notes: >
          Shipped via computeTotal (ADR 0012). Bid value alone determines
          tricks needed: floor((bid-40)/100) + 6 for normal bids; misère
          (250) and open misère (500) treated as bid===tricks=0. Made →
          +bid; set → −bid; non-bidder always +10×tricks. 2 teams,
          target 500.
      - id: 7.5
        title: Belote / Coinche
        status: deferred
        notes: Declarations + per-deal value formulas.
      - id: 7.6
        title: Darts 501 / 301 / 701
        status: done
        notes: >
          Shipped via cherry-pick (ADR 0010). Uses rounds engine plus the
          new scoring.displayMode 'remaining' flag for the iconic
          countdown display. Bust handling and double-out finish are
          user-managed (engine doesn't enforce; users enter 0 for bust
          turns).
      - id: 7.7
        title: Darts Cricket
        status: deferred
        notes: Marks-per-number matrix (15–20 + bull) — different shape.
      - id: 7.8
        title: Snooker
        status: deferred
        notes: In-frame break calculator + frame-of-match counter (nested).
      - id: 7.9
        title: Scrabble  (per-turn score, manual game-end)
        status: done
        notes: Single field per turn; user applies multipliers + bingo bonus mentally. No endCondition — leader pulses until manual reset.
      - id: 7.10
        title: Cricket
        status: deferred
        notes: Its own subdomain — runs, wickets, overs, batting/bowling figures.

  - phase: 8
    title: Heavy / specialty (wholesale deferred per ADR 0010)
    status: deferred
    deps: [7]
    summary: >
      Games whose scoring is famously intricate or whose "scoring" is really
      state tracking. Each needs bespoke domain code. Wholesale deferred per
      ADR 0010 — pick from this list only when there's specific demand.
    tasks:
      - id: 8.1
        title: Bridge (rubber)  (bid + contract + vulnerability + slam bonuses)
        status: deferred
        notes: Contract × vulnerability × slam bonuses + rubber tracking. Own engine.
      - id: 8.2
        title: Mahjong  (start with Chinese Classical; defer Japanese riichi)
        status: deferred
        notes: Hand-value (fan/yaku) is its own subdomain; regional variants. Own engine.
      - id: 8.3
        title: Skat  (multiplier ladder, failed contracts)
        status: deferred
        notes: Multiplier ladder (matadors × hand × schneider × schwarz × ouvert). Own engine.
      - id: 8.4
        title: Go  (territory + captures + komi calculator)
        status: deferred
        notes: Territory counter + captures + komi. Own engine.
      - id: 8.5
        title: Werewolf / Mafia
        status: deferred
        notes: Day/night state, role reveals — not really scoring. Different category.
      - id: 8.6
        title: Liar's Dice
        status: deferred
        notes: Dice-remaining elimination tracker — not really scoring.
      - id: 8.7
        title: President / Asshole
        status: deferred
        notes: Finishing-order ladder over a session — closer to a game-show tracker.

