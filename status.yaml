        status: planned
      - id: 7.2
        title: Pinochle  (meld + tricks, itemized meld entry)
        status: planned
      - id: 7.3
        title: Canasta  (melds, canastas, red threes, going-out bonus, hand penalty)
        status: planned
      - id: 7.4
        title: 500  (bid-value lookup table, misère)
        status: planned
      - id: 7.5
        title: Belote / Coinche
        status: planned
      - id: 7.6
        title: Darts 501 / 301 / 701  (running countdown, double-out, checkout suggestions)
        status: planned
      - id: 7.7
        title: Darts Cricket  (15–20 + bullseye matrix UI)
        status: planned
      - id: 7.8
        title: Snooker  (frame break calculator + match frames)
        status: planned
      - id: 7.9
        title: Scrabble  (multiplier helper, 50-pt bingo bonus)
        status: planned
      - id: 7.10
        title: Cricket  (runs/wickets/overs — likely its own subdomain)
        status: planned

  - phase: 8
    title: Heavy / specialty
    status: planned
    deps: [7]
    summary: >
      Games whose scoring is famously intricate or whose "scoring" is really
